
name: Rocket Animation

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate Rocket SVG
        run: |
          mkdir -p dist
          cat <<EOF > dist/rocket.svg
          <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="200" fill="#0d1117"/>
            <circle cx="100" cy="50" r="2" fill="white"/>
            <circle cx="300" cy="80" r="2" fill="white"/>
            <circle cx="500" cy="30" r="2" fill="white"/>
            <circle cx="700" cy="90" r="2" fill="white"/>
            <g>
              <polygon points="0,100 40,80 40,120" fill="white"/>
              <rect x="40" y="80" width="40" height="40" fill="red"/>
              <circle cx="60" cy="100" r="10" fill="skyblue"/>
              <polygon points="0,100 -20,90 -20,110" fill="orange">
                <animate attributeName="points"
                  values="0,100 -20,90 -20,110;0,100 -30,95 -30,105;0,100 -20,90 -20,110"
                  dur="0.3s"
                  repeatCount="indefinite"/>
              </polygon>
              <animateTransform attributeName="transform"
                type="translate"
                from="0 0" to="700 0"
                dur="5s" repeatCount="indefinite"/>
            </g>
          </svg>
          EOF
